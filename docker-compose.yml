services:
    web:
        image: nginx:alpine
        container_name: unit3d-staging-web
        restart: unless-stopped
        tmpfs:
            - /var/www/html/storage/app/backups:size=10M,mode=777
            - /var/www/html/storage/app/backup-temp:size=2G,mode=777
        ports:
            - "${HTTP_PORT:-58080}:80"
        volumes:
            - .:/var/www/html
            - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - unit3d

    app:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile.app
        container_name: unit3d-staging-app
        restart: unless-stopped
        tmpfs:
            - /var/www/html/storage/app/backups:size=10M,mode=777
            - /var/www/html/storage/app/backup-temp:size=2G,mode=777
        volumes:
            - .:/var/www/html
        environment:
            - LD_PRELOAD=/usr/lib/libiconv.so.2
            - DB_HOST=db
            - DB_DATABASE=${DB_DATABASE:-unit3d}
            - DB_USERNAME=${DB_USERNAME:-unit3d}
            - DB_PASSWORD=${DB_PASSWORD:-unit3d}
            - REDIS_HOST=redis
            - MEILISEARCH_HOST=http://meilisearch:7700
            - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
            - TELEGRAM_TOPIC_NOVEDADES=${TELEGRAM_TOPIC_NOVEDADES}
        depends_on:
            - db
            - redis
            - meilisearch
        networks:
            - unit3d

    scheduler:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile.app
        container_name: unit3d-staging-scheduler
        restart: unless-stopped
        entrypoint: ["/usr/local/bin/entrypoint-scheduler.sh"]
        tmpfs:
            - /var/www/html/storage/app/backups:size=10M,mode=777
            - /var/www/html/storage/app/backup-temp:size=2G,mode=777
        volumes:
            - .:/var/www/html
        environment:
            - DB_HOST=db
            - LD_PRELOAD=/usr/lib/libiconv.so.2
            - DB_DATABASE=${DB_DATABASE:-unit3d}
            - DB_USERNAME=${DB_USERNAME:-unit3d}
            - DB_PASSWORD=${DB_PASSWORD:-unit3d}
            - REDIS_HOST=redis
            - MEILISEARCH_HOST=http://meilisearch:7700
            - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
            - TELEGRAM_TOPIC_NOVEDADES=${TELEGRAM_TOPIC_NOVEDADES}
        depends_on:
            - db
            - redis
            - meilisearch
        networks:
            - unit3d

    worker:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile.app
        container_name: unit3d-staging-worker
        restart: unless-stopped
        entrypoint: ["/usr/local/bin/entrypoint-worker.sh"]
        tmpfs:
            - /var/www/html/storage/app/backups:size=10M,mode=777
            - /var/www/html/storage/app/backup-temp:size=2G,mode=777
        volumes:
            - .:/var/www/html
        environment:
            - DB_HOST=db
            - LD_PRELOAD=/usr/lib/libiconv.so.2
            - DB_DATABASE=${DB_DATABASE:-unit3d}
            - DB_USERNAME=${DB_USERNAME:-unit3d}
            - DB_PASSWORD=${DB_PASSWORD:-unit3d}
            - REDIS_HOST=redis
            - MEILISEARCH_HOST=http://meilisearch:7700
            - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
            - TELEGRAM_TOPIC_NOVEDADES=${TELEGRAM_TOPIC_NOVEDADES}
        depends_on:
            - db
            - redis
            - meilisearch
        networks:
            - unit3d

    db:
        image: mysql/mysql-server:8.0
        container_name: unit3d-staging-db
        restart: unless-stopped
        ports:
            - "${FORWARD_DB_PORT:-53306}:3306"
        environment:
            - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-unit3d}
            - MYSQL_ROOT_HOST=%
            - MYSQL_DATABASE=${DB_DATABASE:-unit3d}
            - MYSQL_USER=${DB_USERNAME:-unit3d}
            - MYSQL_PASSWORD=${DB_PASSWORD:-unit3d}
        volumes:
            - ./.docker/data/mysql:/var/lib/mysql:Z
        networks:
            - unit3d
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-unit3d}"]
            retries: 3
            timeout: 5s

    redis:
        image: redis:alpine
        container_name: unit3d-staging-redis
        restart: unless-stopped
        ports:
            - "${FORWARD_REDIS_PORT:-56379}:6379"
        volumes:
            - ./.docker/data/redis:/data
        networks:
            - unit3d
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s

    meilisearch:
        image: getmeili/meilisearch:v1.37.0
        container_name: unit3d-meilisearch
        restart: unless-stopped
        ports:
            - "${FORWARD_MEILISEARCH_PORT:-57700}:7700"
        environment:
            - MEILI_NO_ANALYTICS=true
            - MEILI_MASTER_KEY=${MEILISEARCH_KEY}
        volumes:
            - ./.docker/data/meilisearch:/meili_data
        networks:
            - unit3d
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
            retries: 3
            timeout: 5s

    mailpit:
        image: axllent/mailpit:latest
        container_name: unit3d-staging-mailpit
        restart: unless-stopped
        ports:
            - "${FORWARD_MAILPIT_PORT:-51025}:1025"
            - "${FORWARD_MAILPIT_DASHBOARD_PORT:-58025}:8025"
        networks:
            - unit3d

networks:
    unit3d:
        driver: bridge
