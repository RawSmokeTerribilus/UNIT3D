name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [ main ] # Ejecutar cuando subas cambios a main
    paths:
      - 'book/**' # Solo ejecutar si cambian cosas del libro

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
          
      - name: Build Book
        working-directory: ./book
        run: mdbook build
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book/book # Carpeta donde mdBook escupe el HTML
